
services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: ["sh", "/app/entrypoint.sh"]
  
  db:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine

  worker:
    build: .
    volumes:
      - .:/app
    command: celery -A src.core.celery_app:celery_app worker --loglevel=info
    depends_on:
      - redis
  
  beat:
    build: .
    volumes:
      - .:/app
    command: celery -A src.core.celery_app:celery_app beat --loglevel=info
    depends_on:
      - redis

volumes:
  postgres-data: